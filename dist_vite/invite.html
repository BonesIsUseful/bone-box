<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Join BoneBox Collaboration</title>
    
    <!-- Enhanced Discord/OpenGraph/Twitter Embed Metadata -->
    <meta property="og:site_name" content="BoneBox">
    <meta property="og:title" content="Join a BoneBox Collaboration Session" id="og-title">
    <meta property="og:description" content="You've been invited to create music together in real-time! Click to join the session." id="og-description">
    <meta property="og:image" content="https://raw.githubusercontent.com/BonesIsUseful/bone-box/main/website/BoneBox_logo_large.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://bonesisuseful.github.io/bone-box/invite.html" id="og-url">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#9c64f7">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Join a BoneBox Collaboration Session" id="twitter-title">
    <meta name="twitter:description" content="You've been invited to create music together in real-time! Click to join the session." id="twitter-description">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/BonesIsUseful/bone-box/main/website/BoneBox_logo_large.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/icon_32-BWHXe-lE.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a0b2e 0%, #0f0520 50%, #1a0b2e 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated background effect */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(156, 100, 247, 0.1) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
            50% { transform: scale(1.1) rotate(180deg); opacity: 0.8; }
        }
        
        .container {
            background: rgba(30, 15, 50, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(156, 100, 247, 0.3);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                        0 0 80px rgba(156, 100, 247, 0.2);
            position: relative;
            z-index: 1;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo-container {
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .logo {
            width: 96px;
            height: 96px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(156, 100, 247, 0.4);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .room-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(124, 77, 255, 0.3), rgba(156, 100, 247, 0.3));
            border: 1px solid rgba(156, 100, 247, 0.5);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            color: #e0d0ff;
            text-transform: uppercase;
        }
        
        h1 {
            margin-bottom: 0.75rem;
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
        }
        
        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 1.5rem;
            padding: 12px;
            background: rgba(124, 77, 255, 0.15);
            border-radius: 12px;
            border: 1px solid rgba(156, 100, 247, 0.2);
        }
        
        .loader {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #9c64f7;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-text {
            font-size: 13px;
            color: #d0d0ff;
            font-weight: 500;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            background: linear-gradient(135deg, #7c4dff, #9c64f7);
            color: white;
            padding: 14px 32px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(124, 77, 255, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(124, 77, 255, 0.6);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        
        .info-card {
            background: rgba(124, 77, 255, 0.1);
            border: 1px solid rgba(156, 100, 247, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-top: 1.5rem;
            text-align: left;
        }
        
        .info-card-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9c64f7;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .info-card-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="./website/BoneBox_logo_large.png" alt="BoneBox Logo" class="logo">
        </div>
        
        <div class="room-badge" id="room-badge">
            🎵 COLLABORATION ROOM
        </div>
        
        <h1 id="heading">Join the Session</h1>
        <p id="description">You've been invited to create music together in real-time!</p>
        
        <div class="status" id="status">
            <div class="loader"></div>
            <span class="status-text">Opening BoneBox...</span>
        </div>
        
        <div class="btn-group">
            <a href="https://bonesisuseful.github.io/bone-box/" class="btn" id="open-btn">
                🎹 Open in Browser
            </a>
            <a href="https://github.com/BonesIsUseful/bone-box" class="btn btn-secondary">
                📥 Download Desktop App
            </a>
        </div>
        
        <div class="info-card">
            <div class="info-card-title">About BoneBox</div>
            <div class="info-card-text">
                A real-time collaborative music creation tool where you can compose chiptune music together with friends.
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('party');

        // Update meta tags dynamically
        if (roomCode) {
            const title = `Join Room ${roomCode} on BoneBox`;
            const description = `Join room ${roomCode} to create music together in real-time on BoneBox!`;
            
            document.getElementById('page-title').textContent = title;
            document.getElementById('og-title').setAttribute('content', title);
            document.getElementById('og-description').setAttribute('content', description);
            document.getElementById('twitter-title').setAttribute('content', title);
            document.getElementById('twitter-description').setAttribute('content', description);
            
            // Update the room badge
            document.getElementById('room-badge').textContent = `🎵 ROOM ${roomCode}`;
            
            // Update heading
            document.getElementById('heading').textContent = `Join Room ${roomCode}`;
            
            // Update the browser link to include the party code
            const browserLink = `https://bonesisuseful.github.io/bone-box/?party=${roomCode}`;
            document.getElementById('open-btn').href = browserLink;
            
            // Attempt to open the deep link (for desktop app)
            const deepLink = `bonebox://join/${roomCode}`;
            
            // Try opening in a new window first (less disruptive)
            const popup = window.open(deepLink, '_blank');
            
            // If popup was blocked or closed, update status
            setTimeout(() => {
                const status = document.getElementById('status');
                status.innerHTML = `
                    <span class="status-text">✨ Click "Open in Browser" to join!</span>
                `;
            }, 2000);
        } else {
            // No room code, just redirect to main page
            document.getElementById('heading').textContent = 'Welcome to BoneBox';
            document.getElementById('description').textContent = 'Create chiptune music in your browser or download the desktop app.';
            document.getElementById('status').style.display = 'none';
            document.getElementById('room-badge').textContent = '🎵 MUSIC CREATION';
        }
    </script>
</body>
</html>
